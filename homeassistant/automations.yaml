# Self-renewing Claude usage token, Home Assistant wiring.
# 1) Put renew.py at /config/claude_usage/renew.py and your minted credentials
#    (the JSON that mint_claude_token.py saved) at /config/claude_usage/credentials.json
# 2) Add to configuration.yaml (merge into an existing shell_command: block if present):
#
#    shell_command:
#      claude_usage_renew: "python3 /config/claude_usage/renew.py"
#
# 3) Add these to automations.yaml (or recreate via the UI), then reload.

- id: claude_usage_token_autorenew
  alias: "Claude Usage - auto-renew OAuth token (4h)"
  description: "Access tokens live ~8h; the refresh token ~30 days and rotates on use. 4-hourly = 2 retry windows per token."
  triggers:
    - trigger: time_pattern
      hours: "/4"
      minutes: "7"
  actions:
    - action: shell_command.claude_usage_renew
      response_variable: renew
    - choose:
        - conditions: "{{ renew.returncode == 0 }}"
          sequence:
            - action: rest.reload
            - action: persistent_notification.dismiss
              data:
                notification_id: claude_usage_renew_failed
      default:
        - action: persistent_notification.create
          data:
            notification_id: claude_usage_renew_failed
            title: "Claude usage token renewal FAILED"
            message: >-
              renew.py failed: {{ renew.stdout }} {{ renew.stderr }} - will retry in 4h.
              If it keeps failing, re-run mint_claude_token.py and copy the JSON to
              /config/claude_usage/credentials.json.
  mode: single

- id: claude_usage_token_autoheal
  alias: "Claude Usage - immediate renew on auth failure"
  description: "Self-heal fast (e.g. after HA downtime > 8h) instead of waiting for the 4h cycle."
  triggers:
    - trigger: state
      entity_id: sensor.claude_usage_status
      to: "auth_failed"
      for: "00:10:00"
  actions:
    - action: shell_command.claude_usage_renew
      response_variable: renew
    - choose:
        - conditions: "{{ renew.returncode == 0 }}"
          sequence:
            - action: rest.reload
      default:
        - action: persistent_notification.create
          data:
            notification_id: claude_usage_renew_failed
            title: "Claude usage token renewal FAILED"
            message: "Auto-heal renewal failed: {{ renew.stdout }} - re-mint with mint_claude_token.py."
  mode: single
