# The token lives in this helper. The rest sensor reads it as a templated
# Authorization header on every poll, and the renewal automation rewrites it in
# place, so the REST integration is never reloaded. Add under configuration.yaml:
input_text:
  claude_oauth_bearer:
    name: Claude OAuth Bearer
    max: 255

# The token is a live credential. Keep it out of the recorder DB/history/backups:
# recorder:
#   exclude:
#     entities:
#       - input_text.claude_oauth_bearer
